<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Intake Form - BrandBuilder AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><strong>BrandBuilder AI</strong></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="intake-form.html">Start Project</a>
        </nav>
    </header>

    <div class="container">
        <h1>Brand Intake Form</h1>
        <p>Tell us about your brand, and our AI will start crafting your identity.</p>

        <form action="#" method="POST" style="max-width: 600px; margin-top: 2rem;">
            <div class="form-group">
                <label for="brand-name">Brand Name</label>
                <input type="text" id="brand-name" name="brand-name" required placeholder="e.g. Acme Corp">
            </div>

            <div class="form-group">
                <label for="industry">Industry</label>
                <select id="industry" name="industry">
                    <option value="tech">Technology</option>
                    <option value="wellness">Wellness & Health</option>
                    <option value="finance">Finance</option>
                    <option value="retail">Retail & E-commerce</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="brand-values">Brand Values (Comma separated)</label>
                <input type="text" id="brand-values" name="brand-values" placeholder="e.g. Modern, Trustworthy, Innovative">
            </div>

            <div class="form-group">
                <label for="target-audience">Target Audience</label>
                <textarea id="target-audience" name="target-audience" rows="3" placeholder="Describe who your customers are..."></textarea>
            </div>

            <div class="form-group">
                <label for="color-preference">Color Preference</label>
                <select id="color-preference" name="color-preference">
                    <option value="minimal">Minimalist (Black & White)</option>
                    <option value="vibrant">Vibrant & Bold</option>
                    <option value="earth">Earth Tones</option>
                    <option value="pastel">Pastels</option>
                </select>
            </div>

            <div class="form-group">
                <label for="additional-info">Additional Information</label>
                <textarea id="additional-info" name="additional-info" rows="3" placeholder="Anything else we should know?"></textarea>
            </div>

            <button type="submit" class="btn">Generate Brand Identity</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 BrandBuilder AI Agency. All rights reserved.</p>
    </footer>
</body>
</html>
